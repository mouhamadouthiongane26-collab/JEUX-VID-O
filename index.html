<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assane Kart 3D</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="ui-root">
      <div id="main-menu" class="panel visible">
        <h1>ASSANE KART 3D</h1>
        <p>Course fun et dynamique style cartoon.</p>
        <button id="play-btn">Jouer</button>
        <button id="options-btn">Options</button>
        <button id="quit-btn">Quitter</button>
      </div>

      <div id="setup-menu" class="panel hidden">
        <h2>Préparation de la course</h2>
        <label>Personnage
          <select id="character-select"></select>
        </label>
        <label>Kart
          <select id="kart-select"></select>
        </label>
        <label>Circuit
          <select id="track-select"></select>
        </label>
        <div class="row">
          <button id="back-btn">Retour</button>
          <button id="start-btn">Démarrer</button>
        </div>
      </div>

      <div id="options-menu" class="panel hidden">
        <h2>Options</h2>
        <label>Volume
          <input id="volume-range" type="range" min="0" max="100" value="70" />
        </label>
        <button id="options-back-btn">Retour</button>
      </div>

      <div id="hud" class="hidden">
        <div id="countdown"></div>
        <div class="hud-left">
          <div id="lap">Tour: 1/3</div>
          <div id="position">Position: 1/8</div>
          <div id="speed">Vitesse: 0 km/h</div>
          <div id="chrono">Temps: 00:00.000</div>
        </div>
        <div class="hud-right">
          <div id="item">Bonus: Aucun</div>
          <div class="help">Flèches: conduire · Espace: bonus</div>
        </div>
      </div>

      <div id="result-panel" class="panel hidden">
        <h2>Course terminée !</h2>
        <p id="result-text"></p>
        <button id="race-again-btn">Rejouer</button>
      </div>
    </div>

    <canvas id="game"></canvas>
    <script type="module" src="src/game.js"></script>
  </body>
</html>
